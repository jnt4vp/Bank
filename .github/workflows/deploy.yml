name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend build check ──────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # ── Backend import/syntax check ───────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r backend/requirements.txt
      - run: python -m py_compile backend/main.py
        working-directory: .

  # ── Deploy to EC2 (main branch only) ─────────────────────────────────────
  deploy:
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            # The Docker deployment path owns port 80; stop the legacy host stack if it is still present.
            sudo systemctl stop nginx || true
            sudo systemctl stop bankapp || true
            sudo git -c safe.directory=/opt/bankapp -C /opt/bankapp pull --ff-only origin main
            # Free RAM during the in-place vite build: ollama (llama3.2:1b) holds ~1.5 GB
            # resident, which on a small EC2 instance pushes the host into swap mid-build and
            # makes node appear hung during chunk write. compose recreates ollama at the end.
            sudo docker stop bank_ollama || true
            sudo docker-compose --env-file /opt/bankapp/.env.prod -f /opt/bankapp/docker-compose.prod.yml up --build -d
            sudo docker image prune -f
